specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Lufthansa
providerId: lufthansa
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Airlines
  - Travel
description: 'FOCUS-aligned FinOps for Lufthansa Open API: Open Data plan is free / registration-based,
  Fares plan is partner-contracted with commercial terms in the NDC Partner Program. Cost shape is
  partner-contract-driven rather than per-call usage billing.'
sources:
  - https://developer.lufthansa.com
notes: No public pricing/billing surface; cost meters reflect typical airline NDC partner billing lines.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Deutsche Lufthansa AG
serviceCategory: Travel
billingModel:
  pricingCategory: Free Registration + Partner Contract
  billingFrequency: Per-Contract
  billingCurrency: EUR
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Lufthansa Open API
  ServiceCategory: Travel
  ProviderName: Lufthansa
  PublisherName: Deutsche Lufthansa AG
  InvoiceIssuerName: Deutsche Lufthansa AG
  BillingCurrency: EUR
meters:
  - name: api_requests_open_data
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
  - name: fare_offer_requests
    unit: request
    aggregation: sum
    dimensions:
      - origin
      - destination
  - name: bookings_completed
    unit: booking
    aggregation: sum
  - name: ndc_offer_calls
    unit: request
    aggregation: sum
principles:
  - name: Visibility
    description: Track Open Data API consumption against developer-portal counters; for Fares, reconcile
      offer/booking traffic against the NDC partner statement.
  - name: Allocation
    description: Tag requests by integration (booking, ops, cargo, notifications) and by partner consumer
      app for chargeback.
  - name: Optimization
    description: Cache reference data (airports, schedules) and reduce repeat fare-offer calls; consolidate
      polling on the Notifications API to lower call volume.
  - name: Accountability
    description: Partner-side owners review NDC contract economics quarterly; renegotiate via the Lufthansa
      partner team as volume grows.
