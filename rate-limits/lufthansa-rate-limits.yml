specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Lufthansa
providerId: lufthansa
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Airlines
  - Travel
description: Lufthansa Open API portal does not publish numeric rate-limits on its key info / docs landing.
  Limits are governed by plan (Open Data vs Fares) and are typically communicated post-registration.
sources:
  - https://developer.lufthansa.com
notes: No public rate-limits documentation found at reconciliation time. OAuth2 is required for all calls.
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Open Data Plan requests
    scope: api-key
    metric: varies
    limit: 'see developer portal post-registration'
  - name: Fares Plan requests
    scope: api-key
    metric: varies
    limit: 'see partner agreement'
policies:
  - name: OAuth2 required
    description: All requests must be authorized via the OAuth2 token endpoint before calling resource APIs.
  - name: Plan-scoped access
    description: Endpoints available depend on Open Data vs Fares plan; calling out-of-plan endpoints
      yields 401/403 rather than 429.
  - name: Backoff
    description: On 429, retry with exponential backoff and respect Retry-After when present.
