specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Lufthansa
providerId: lufthansa
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Airlines
  - Travel
  - Aviation
  - NDC
description: Lufthansa Open API portal exposes two access plans — Open Data and Fares — both gated behind
  developer registration and OAuth2. Open Data is publicly registerable; the Fares plan requires partner
  enablement following the Fares_Availability instructions. Pricing is not publicly disclosed; commercial
  terms apply through the NDC Partner Program for fares/offer flows.
sources:
  - https://developer.lufthansa.com
notes: Public developer portal does not list dollar prices; reconciled=false until partner pricing
  surfaces in the developer portal.
plans:
  - id: lufthansa-open-data
    name: Open Data Plan
    type: freemium
    description: Public registration. Access to reference data, flight status, schedules, lounges, seat
      maps, and similar non-fare endpoints.
    entries:
      - label: Registration
        name: registration
        type: subscription
        metric: account
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: Reference data
      - name: Flight status
      - name: Schedules
      - name: Lounges
      - name: Seat maps
  - id: lufthansa-fares
    name: Fares Plan
    type: enterprise
    description: Partner / NDC plan for fares, availability, offer/pricing flows. Activation requires
      following the Fares_Availability instructions. Pricing per partner agreement.
    entries:
      - label: Partner contract
        name: partner
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: global
        unit: 1
        price: contact partner team
        userMultiplied: false
    elements:
      - name: Fares & Availability
      - name: NDC Smart Offer
      - name: NDC Bonus
      - name: Servicing
      - name: Technology
