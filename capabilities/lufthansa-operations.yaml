          date: rest.date
          Accept: rest.Accept
          limit: rest.limit
          offset: rest.offset
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/operations/schedules/{origin}/{destination}/{fromdatetime}
      name: operations-schedules-origin-destination-fromdatetime
      description: REST surface for operations-schedules-origin-destination-fromDateTime.
      operations:
      - method: GET
