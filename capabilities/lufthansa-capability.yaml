        - name: Accept
          in: header
          type: string
          required: true
          description: 'http header: application/json or application/xml (Acceptable values are: "application/json", "application/xml")'
        - name: directFlights
          in: query
          type: boolean
          description: Show only direct flights (false=0, true=1). Default is false
        - name: limit
